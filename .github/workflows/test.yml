name: Test

on:
  pull_request:

jobs:
  test:
    name: Test
    runs-on: windows-latest
    steps:
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Checkout
        uses: actions/checkout@v6
      - name: Test
        run: zig build test
